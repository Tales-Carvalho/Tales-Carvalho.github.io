<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  </head>
  <style>
    body {
      text-align: center;
      font-family: 'Roboto', 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    img {
      width: 480px;
    }
    a {
      margin-top: 50px;
      border: 1px solid black;
      margin-top: 10px;
      border-radius: 5px;
      background-color: lightgreen;
      color: black;
      text-decoration: none;
      padding: 5px;
    }
  </style>
  <body>
    <img id="img-foto">
    <p>
      <a id="link-foto" download="foto">Baixar Foto</a>
    </p>
  </body>
  <script>
    (function() {
      const num = window.location.search.substring(1)
      document.getElementById("img-foto").setAttribute("src", `fotos/${num}.jpg`)
      document.getElementById("link-foto").setAttribute("href", `fotos/${num}.jpg`)
    })()
  </script>
</html>
